        }

        canvas { max-height: 70vh; }

            margin-top: 20px;
            background: #0f3460;
            border-radius: 12px;
            padding: 15px 20px;
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 15px;
        }
        .info-item {
            text-align: center;
        }
        .info-label { color: #888; font-size: 12px; margin-bottom: 5px; }
        .info-value { font-size: 20px; font-weight: bold; }
        .up { color: #ff4757; }
        .down { color: #2ed573; }
        .neutral { color: #ffa502; }
        .controls {
            margin-bottom: 15px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }
        .controls label { color: #888; font-size: 14px; }
        .controls select {
            background: #0f3460;
            border: 1px solid #00d4ff;
            color: #00d4ff;
            padding: 8px 15px;
            border-radius: 6px;
            cursor: pointer;
        }
    </style>

            const colors = fullData.map(d => getZoneColor(d.zone));

            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '情绪值',
                        data: values,
                        borderColor: "#00d4ff",
                        backgroundColor: "rgba(0, 212, 255, 0.1)",
                        borderWidth: 2,
                        pointRadius: 3,
                        pointHoverRadius: 8,
                        pointBackgroundColor: colors,
                        pointBorderColor: colors,
                        fill: true,
                        tension: 0.3
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: {
                        intersect: false,
                        mode: 'index'
                    },
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: 'rgba(0,0,0,0.8)',
                            titleColor: '#00d4ff',
                            bodyColor: '#fff',
                            borderColor: '#00d4ff',
                            borderWidth: 1,
                            callbacks: {
                                label: function(context) {
                                    const idx = context.dataIndex;
                                    const d = fullData[idx];
                                    return [
                                        `情绪值: ${d.finalScore.toFixed(2)}`,
                                        `原始值: ${d.rawScore.toFixed(2)}`,
                                        `日期: ${d.date}`,
                                        `区间: ${d.zone}`
                                    ];
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            grid: { color: 'rgba(255,255,255,0.1)' },
                            ticks: { color: '#888', maxTicksLimit: 20 }
                        },
                        y: {
                            min: 0,
                            max: 100,
                            grid: { color: 'rgba(255,255,255,0.1)' },
                            ticks: { color: '#888' },
                            title: { display: true, text: '情绪值', color: '#888' }
                        }
                    }
                }
            });
        }

        function updateChart() {
            if (chart) {
                const metric = document.getElementById('metricSelect').value;
                const values = fullData.map(d => d[metric]);
                chart.data.datasets[0].data = values;
                chart.update();
            }
        }

        initChart();
    </script>
</body>
</html>
